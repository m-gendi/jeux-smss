<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Navigation Jeux Coptes</title>
    <style>
        :root {
            --copte-blue: #0a2a5a;
            --copte-gold: #d4af37;
            --copte-gold-light: #f1d592;
            --white: #ffffff;
        }

        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            width: 100%;
            font-family: 'Palatino Linotype', 'Book Antiqua', Palatino, serif;
            display: flex;
            justify-content: center;
            align-items: center;
            /* Ton image Cloudinary en arrière-plan */
            background: url('https://res.cloudinary.com/dx4uwptap/image/upload/v1776104207/background_jeux_bcfvj6.png') no-repeat center center fixed;
            background-size: cover;
        }

        .dropdown-container {
            position: relative;
            z-index: 1000;
            width: 320px;
        }

        .dropdown-button {
            width: 100%;
            padding: 16px 22px;
            background-color: rgba(10, 42, 90, 0.95);
            color: var(--copte-gold);
            border: 2px solid var(--copte-gold);
            border-radius: 12px;
            font-size: 1.1rem;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 1px;
            cursor: pointer;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
            transition: all 0.3s ease;
        }

        .dropdown-button:hover {
            background-color: var(--copte-blue);
            transform: translateY(-2px);
        }

        .arrow {
            font-size: 0.8rem;
            transition: transform 0.3s ease;
        }

        .open .arrow {
            transform: rotate(180deg);
        }

        .dropdown-menu {
            position: absolute;
            top: calc(100% + 10px);
            left: 0;
            width: 100%;
            background-color: rgba(10, 42, 90, 0.98);
            border: 2px solid var(--copte-gold);
            border-radius: 12px;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.5);
            opacity: 0;
            visibility: hidden;
            transform: translateY(-10px);
            transition: all 0.3s ease;
            padding: 10px 0;
            list-style: none;
            margin: 0;
        }

        .open .dropdown-menu {
            opacity: 1;
            visibility: visible;
            transform: translateY(0);
        }

        .menu-item a {
            display: flex;
            align-items: center;
            padding: 14px 20px;
            color: var(--copte-gold-light);
            text-decoration: none;
            font-weight: 600;
            transition: background 0.2s;
        }

        .menu-item a:hover {
            background-color: rgba(212, 175, 55, 0.2);
            color: var(--white);
        }

        .icon-box {
            margin-right: 15px;
            width: 30px;
            text-align: center;
            font-size: 1.3rem;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .badge-50 {
            background: var(--copte-gold);
            color: var(--copte-blue);
            font-size: 0.75rem;
            font-weight: 900;
            padding: 2px 5px;
            border-radius: 4px;
            line-height: 1;
            border: 1px solid var(--copte-blue);
        }

    </style>
</head>
<body>

    <div class="dropdown-container" id="navDropdown">
        <button class="dropdown-button" onclick="toggleDropdown()">
            <span>Choisir un jeu</span>
            <span class="arrow">▼</span>
        </button>
        
        <ul class="dropdown-menu">
            <li class="menu-item">
                <a href="jeu-khamaseen.html">
                    <span class="icon-box"><span class="badge-50">50</span></span> Jeu Khamaseen
                </a>
            </li>
            <li class="menu-item">
                <a href="jeu-semaine-sainte.html">
                    <span class="icon-box">⛪</span> Jeu Semaine Sainte
                </a>
            </li>
            <li class="menu-item">
                <a href="questionnaire.html">
                    <span class="icon-box">⏳</span> Frise Chronologique Semaine Sainte
                </a>
            </li>
        </ul>
    </div>

    <script>
        function toggleDropdown() {
            const container = document.getElementById('navDropdown');
            container.classList.toggle('open');
        }

        // Fermeture automatique si on clique ailleurs
        window.onclick = function(event) {
            if (!event.target.closest('.dropdown-container')) {
                const container = document.getElementById('navDropdown');
                if (container.classList.contains('open')) {
                    container.classList.remove('open');
                }
            }
        }
    </script>

</body>
</html>
