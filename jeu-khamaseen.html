<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Pèlerinage 3D des 50 Jours (Khamaseen)</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            overflow: hidden;
            background-color: #87CEEB;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            touch-action: none;
        }
        #canvas-container {
            width: 100vw;
            height: 100vh;
            display: block;
        }
        /* UI Overlay */
        #ui-layer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }
        .header {
            background: rgba(0, 0, 0, 0.7);
            color: white;
            padding: 15px;
            text-align: center;
            border-bottom: 2px solid #f59e0b;
            pointer-events: auto;
            transition: opacity 0.5s ease;
            opacity: 1;
        }
        .header h1 {
            margin: 0;
            font-size: 1.2rem;
            color: #fbd38d;
        }
        .header p {
            margin: 5px 0 0 0;
            font-size: 0.8rem;
        }
        /* Dialog Box */
        #dialog-box {
            display: none;
            background: rgba(255, 255, 255, 0.95);
            margin: 20px auto;
            width: 90%;
            max-width: 600px;
            border-radius: 12px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.5);
            pointer-events: auto;
            overflow: hidden;
            border: 2px solid #b45309;
            transform: translateY(20px);
            opacity: 0;
            transition: all 0.3s ease;
        }
        #dialog-box.active {
            display: block;
            transform: translateY(0);
            opacity: 1;
        }
        .dialog-header {
            background: #b45309;
            color: white;
            padding: 15px;
            font-weight: bold;
            font-size: 1.2rem;
        }
        .dialog-content {
            padding: 20px;
            color: #1e293b;
            font-size: 1rem;
            line-height: 1.5;
            max-height: 50vh;
            overflow-y: auto;
        }
        .bible-quote {
            font-style: italic;
            border-left: 4px solid #f59e0b;
            padding-left: 10px;
            margin-bottom: 15px;
            color: #334155;
        }
        .dogma-box {
            background: #fef3c7;
            border: 1px solid #fde68a;
            padding: 10px;
            border-radius: 8px;
            font-size: 0.9rem;
            margin-bottom: 15px;
        }
        .dogma-title {
            font-weight: bold;
            color: #92400e;
            margin-bottom: 5px;
        }
        .sources-section {
            font-size: 0.8rem;
            color: #64748b;
            border-top: 1px solid #cbd5e1;
            padding-top: 10px;
        }
        .btn-close {
            display: block;
            width: 100%;
            padding: 15px;
            background: #f1f5f9;
            border: none;
            border-top: 1px solid #cbd5e1;
            font-weight: bold;
            color: #0f172a;
            cursor: pointer;
            transition: background 0.2s;
        }
        .btn-close:hover {
            background: #e2e8f0;
        }
        
        /* Floating NPC Labels */
        .npc-label {
            position: absolute;
            color: white;
            background: rgba(0,0,0,0.6);
            padding: 4px 8px;
            border-radius: 4px;
            font-size: 12px;
            pointer-events: none;
            transform: translate(-50%, -50%);
            border: 1px solid #f59e0b;
            transition: opacity 0.2s;
            white-space: nowrap;
        }

        #fade-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background-color: black;
            opacity: 0;
            pointer-events: none;
            transition: opacity 1s ease;
            z-index: 9999;
        }

        /* --- CONTRÔLES MOBILE --- */
        #joystick-zone {
            position: absolute;
            width: 120px;
            height: 120px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 50%;
            border: 2px solid rgba(255, 255, 255, 0.3);
            pointer-events: auto;
            touch-action: none;
            display: none; 
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }
        #joystick-knob {
            width: 50px;
            height: 50px;
            background: rgba(255, 255, 255, 0.8);
            border-radius: 50%;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
            pointer-events: none;
            transform: translate(0px, 0px);
        }
        #btn-interact {
            position: absolute;
            bottom: 50px;
            right: 30px;
            width: 90px;
            height: 90px;
            background: #b45309;
            color: white;
            border-radius: 50%;
            border: 3px solid #fbd38d;
            font-weight: bold;
            font-size: 13px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
            pointer-events: auto;
            display: none; 
            z-index: 1001;
            cursor: pointer;
            touch-action: none;
            align-items: center;
            justify-content: center;
            text-align: center;
            transition: background 0.2s, transform 0.1s;
            user-select: none;
            flex-direction: column;
        }
        #btn-interact:active {
            background: #92400e;
            transform: scale(0.95);
        }
        #pc-hint {
            position: absolute;
            bottom: 20px;
            left: 20px;
            background: rgba(0,0,0,0.7);
            color: white;
            padding: 10px 15px;
            border-radius: 8px;
            font-size: 14px;
            pointer-events: none;
            display: none;
        }

        /* --- QUIZ UI CORRIGÉ POUR LE SCROLL --- */
        #quiz-overlay {
            display: none;
            position: fixed; 
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background: rgba(15, 23, 42, 0.95);
            z-index: 10000;
            pointer-events: auto;
            overflow-y: auto; 
            -webkit-overflow-scrolling: touch; 
            padding: 20px 0;
        }
        #quiz-container {
            background: white;
            width: 90%;
            max-width: 700px;
            border-radius: 12px;
            padding: 30px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.8);
            border: 3px solid #b45309;
            text-align: center;
            position: relative;
            margin: 40px auto; 
        }
        #btn-exit-quiz {
            position: absolute;
            top: 20px;
            left: 20px;
            background: none;
            border: none;
            font-size: 1.5rem;
            color: #b45309;
            cursor: pointer;
            transition: transform 0.2s;
        }
        #btn-exit-quiz:hover {
            transform: scale(1.2);
        }
        #quiz-title {
            color: #b45309;
            margin-top: 0;
            font-size: 1.8rem;
        }
        #quiz-question {
            font-size: 1.2rem;
            color: #1e293b;
            margin: 20px 0;
            font-weight: bold;
        }
        .quiz-option {
            display: block;
            width: 100%;
            padding: 12px 15px;
            margin: 10px 0;
            background: #f1f5f9;
            border: 2px solid #cbd5e1;
            border-radius: 8px;
            font-size: 1rem;
            cursor: pointer;
            transition: all 0.2s;
            text-align: left;
        }
        .quiz-option:hover:not(:disabled) {
            background: #e2e8f0;
            border-color: #94a3b8;
        }
        .quiz-option.correct {
            background: #dcfce7;
            border-color: #22c55e;
            color: #166534;
        }
        .quiz-option.wrong {
            background: #fee2e2;
            border-color: #ef4444;
            color: #991b1b;
        }
        #quiz-feedback {
            margin-top: 20px;
            padding: 15px;
            border-radius: 8px;
            display: none;
            font-size: 0.95rem;
            text-align: left;
        }
        #quiz-next-btn, #quiz-restart-btn {
            margin-top: 20px;
            padding: 12px 25px;
            background: #b45309;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 1.1rem;
            cursor: pointer;
            display: none;
            margin-left: auto;
            margin-right: auto;
        }
        #quiz-next-btn:hover, #quiz-restart-btn:hover {
            background: #92400e;
        }
        #quiz-progress {
            font-size: 0.9rem;
            color: #64748b;
            margin-bottom: 15px;
        }

        @media (min-width: 768px) {
            #joystick-zone { display: none !important; }
        }
    </style>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
</head>
<body>

    <div id="canvas-container"></div>

    <div id="ui-layer">
        <div class="header" id="game-header">
            <h1>Pèlerinage des 50 Jours (Khamaseen)</h1>
            <p>Utilisez les contrôles pour marcher. Approchez les personnages pour méditer les Écritures.</p>
        </div>

        <button id="btn-interact">ACTION</button>
        
        <div id="joystick-zone">
            <div id="joystick-knob"></div>
        </div>

        <div id="dialog-box">
            <div class="dialog-header" id="dialog-title">Titre</div>
            <div class="dialog-content">
                <div class="bible-quote" id="dialog-quote">Citation biblique</div>
                <div class="dogma-box">
                    <div class="dogma-title">Dogme & Rite Copte Orthodoxe</div>
                    <div id="dialog-dogma">Règle liturgique</div>
                </div>
                <div class="sources-section" id="dialog-sources">
                    Sources
                </div>
            </div>
            <button class="btn-close" id="btn-close-dialog">Continuer le pèlerinage</button>
        </div>
        
        <div id="fade-overlay"></div>
    </div>

    <!-- Interface du Questionnaire -->
    <div id="quiz-overlay">
        <div id="quiz-container">
            <button id="btn-exit-quiz" title="Quitter le questionnaire">←</button>
            <h2 id="quiz-title">L'Épreuve du Témoin</h2>
            <div id="quiz-progress">Question 1 / 12</div>
            <div id="quiz-question">Question text</div>
            <div id="quiz-options"></div>
            <div id="quiz-feedback"></div>
            <button id="quiz-next-btn">Question suivante</button>
            <button id="quiz-restart-btn">Terminer le pèlerinage</button>
        </div>
    </div>

    <script>
        // --- DONNÉES FACTUELLES ET SOURCÉES ---
        const npcData = [
            {
                id: "mary", name: "Marie-Madeleine (Jour 1)", position: { x: -8, z: -5 }, color: 0xe11d48,
                title: "Le Tombeau Vide", quote: "« Ils ont enlevé le Seigneur du sépulcre, et nous ne savons où ils l'ont mis. » (Jean 20:2)",
                dogma: "La Résurrection marque le début du 'Khamaseen' (50 jours). Le ton liturgique devient 'Frayhi' (joyeux). Le jeûne et les métanies (prosternations) sont strictement interdits.",
                sources: "Bible : Jean 20:1-18. Rite : Synaxaire Copte.", action: "dialog"
            },
            {
                id: "sepulchre_door", name: "Entrée du Sépulcre", position: { x: -15, z: -10 }, color: 0x475569,
                title: "Entrer dans le Tombeau", quote: "", dogma: "", sources: "", action: "teleport_sepulchre_inside"
            },
            {
                id: "linen", name: "Les Linges Sacrés", position: { x: -500, z: -501 }, color: 0xffffff,
                title: "Les linges pliés", quote: "« Il vit les bandes qui étaient à terre, et le linge qu'on avait mis sur la tête de Jésus, non pas avec les bandes, mais plié dans un lieu à part. » (Jean 20:6-7)",
                dogma: "L'ordre parfait des linges réfute le vol (Jean 20:7). Des voleurs n'auraient pas pris le temps de séparer les bandelettes et de plier le suaire.",
                sources: "Bible : Jean 20:6-7. Exégèse copte.", action: "dialog"
            },
            {
                id: "sepulchre_exit", name: "Sortir du Tombeau", position: { x: -500, z: -492 }, color: 0x475569,
                title: "Sortir", quote: "", dogma: "", sources: "", action: "teleport_sepulchre_outside"
            },
            {
                id: "emmaus", name: "Les Disciples d'Emmaüs (Jour 1)", position: { x: 15, z: -25 }, color: 0xd97706,
                title: "À l'Auberge d'Emmaüs", quote: "« Notre cœur ne brûlait-il pas au dedans de nous, lorsqu'il nous parlait en chemin ? » (Luc 24:32)",
                dogma: "Le Christ se fait reconnaître à la 'fraction du pain'. Cela fonde la présence réelle dans l'Eucharistie.",
                sources: "Bible : Luc 24:13-35. Dogme : Mystères Divins.", action: "dialog"
            },
            {
                id: "cenacle_door", name: "Porte du Cénacle", position: { x: -10, z: -35 }, color: 0x8b4513,
                title: "Entrer", quote: "", dogma: "", sources: "", action: "teleport_inside"
            },
            {
                id: "thomas", name: "Saint Thomas (Jour 8)", position: { x: 497, z: 490 }, color: 0x16a34a,
                title: "Le Dimanche de la Nouvelle", quote: "« Thomas lui répondit : Mon Seigneur et mon Dieu ! » (Jean 20:28)",
                dogma: "Le 8ème jour (Ahad Touma) affirme la divinité absolue du Christ et la réalité physique de la Résurrection.",
                sources: "Bible : Jean 20:24-29. Liturgie : Katamaros Copte.", action: "dialog"
            },
            {
                id: "peter", name: "Saint Pierre", position: { x: 503, z: 490 }, color: 0x2563eb,
                title: "La joie des disciples", quote: "« Les disciples furent dans la joie en voyant le Seigneur. » (Jean 20:20)",
                dogma: "La présence du Christ transforme la peur en joie. L'assemblée préfigure la liturgie dominicale.",
                sources: "Bible : Jean 20:20.", action: "dialog"
            },
            {
                id: "john", name: "Saint Jean", position: { x: 500, z: 493 }, color: 0x9333ea,
                title: "Le Témoin", quote: "« Ces choses ont été écrites afin que vous croyiez que Jésus est le Christ. » (Jean 20:31)",
                dogma: "L'Église s'appuie sur le témoignage apostolique oculaire.",
                sources: "Bible : Jean 20:30-31.", action: "dialog"
            },
            {
                id: "disciple_generic", name: "Les autres disciples", position: { x: 495, z: 493 }, color: 0x64748b,
                title: "L'assemblée du Cénacle", quote: "« Jésus vint, les portes étant fermées, et dit : La paix soit avec vous ! » (Jean 20:26)",
                dogma: "Le corps glorifié n'est plus soumis aux limites physiques tout en restant pleinement charnel.",
                sources: "Bible : Jean 20:26. Christologie orthodoxe.", action: "dialog"
            },
            {
                id: "cenacle_exit", name: "Sortir du Cénacle", position: { x: 500, z: 505 }, color: 0x8b4513,
                title: "Sortir", quote: "", dogma: "", sources: "", action: "teleport_outside"
            },
            {
                id: "tiberias", name: "Le Lac de Tibériade", position: { x: -35, z: -60 }, color: 0xffffff,
                title: "L'Apparition en Galilée", quote: "« Simon, fils de Jonas, m'aimes-tu ? » Il lui répondit : « Oui, Seigneur, tu sais que je t'aime. » Jésus lui dit : « Pais mes brebis. » (Jean 21:16)",
                dogma: "La restauration de Pierre illustre le sacrement de la pénitence et le rôle pastoral.",
                sources: "Bible : Jean 21:1-19.", action: "dialog"
            },
            {
                id: "commission", name: "La mission des disciples", position: { x: 45, z: -78 }, color: 0xffffff,
                title: "La Montagne en Galilée", quote: "« Les onze disciples allèrent en Galilée, sur la montagne que Jésus leur avait désignée. [...] Allez, faites de toutes les nations des disciples, les baptisant au nom du Père, du Fils et du Saint-Esprit. » (Matthieu 28:16,19)",
                dogma: "Fondement dogmatique du sacrement du Baptême Trinitaire.",
                sources: "Bible : Matthieu 28:16-20.", action: "dialog"
            },
            {
                id: "ascension", name: "L'Ascension (Jour 40)", position: { x: 25, z: -60 }, color: 0x0284c7,
                title: "Le Mont des Oliviers", quote: "« Ce Jésus... viendra de la même manière. » (Actes 1:11)",
                dogma: "Procession uniquement dans le sanctuaire à partir de ce jour.",
                sources: "Bible : Actes 1:9-11.", action: "dialog"
            },
            {
                id: "pentecost", name: "La Pentecôte (Jour 50)", position: { x: 0, z: -80 }, color: 0xfacc15,
                title: "La Descente de l'Esprit Saint", quote: "« Et ils furent tous remplis du Saint-Esprit. » (Actes 2:4)",
                dogma: "Office de la Génuflexion (Sajda) le soir. L'Esprit procède du Père seul.",
                sources: "Bible : Actes 2:1-4.", action: "dialog"
            },
            {
                id: "finish_line", name: "Porte de l'Évangélisation (Fin)", position: { x: 0, z: -100 }, color: 0xf59e0b,
                title: "L'Heure du Témoignage", quote: "« Allez par tout le monde, et prêchez la bonne nouvelle à toute la création. » (Marc 16:15)",
                dogma: "Les 50 jours sont terminés. Le jeûne des apôtres commence pour préparer la prédication.",
                sources: "Bible : Marc 16:15.", action: "start_quiz"
            }
        ];

        const quizData = [
            { question: "Pendant les 50 jours du Khamaseen, qu'est-il strictement interdit de faire dans l'Église copte orthodoxe ?", options: ["Prier le soir", "Jeûner et faire des métanies (prosternations)", "Lire l'Ancien Testament", "Chanter des louanges"], correctAnswer: 1, explanation: "Le Khamaseen est une période de fête continue. L'Église interdit le jeûne et les métanies de pénitence car l'Époux est avec nous (Marc 2:19)." },
            { question: "Que prouvent dogmatiquement les linges parfaitement pliés trouvés par Jean et Pierre dans le tombeau vide ?", options: ["Que les apôtres ont nettoyé le tombeau", "Que Jésus était pauvre", "Que le corps n'a pas été volé en hâte", "Que les anges portaient ces linges"], correctAnswer: 2, explanation: "L'ordre parfait réfute la rumeur d'un vol de corps. Des voleurs n'auraient pas pris le temps de séparer les linges et de plier le suaire à part (Jean 20:7)." },
            { question: "Complétez la confession de foi de Saint Thomas le 8ème jour : « Mon Seigneur et mon... »", options: ["Sauveur !", "Roi !", "Dieu !", "Maître !"], correctAnswer: 2, explanation: "« Mon Seigneur et mon Dieu ! » (Jean 20:28). Ce 8ème jour affirme formellement la divinité absolue du Christ." },
            { question: "Au bord de la mer de Tibériade, que demande Jésus trois fois à Pierre ?", options: ["« M'aimes-tu ? »", "« Pourquoi m'as-tu renié ? »", "« As-tu pêché des poissons ? »", "« Veux-tu me suivre ? »"], correctAnswer: 0, explanation: "Il lui demande trois fois « M'aimes-tu ? » pour effacer son triple reniement et lui confier la charge pastorale (Jean 21)." },
            { question: "Quel sacrement est fondé par le commandement : « baptisant au nom du Père, du Fils et du Saint-Esprit » (Grande Commission) ?", options: ["L'Eucharistie", "Le Mariage", "Le Baptême Trinitaire", "L'Ordination"], correctAnswer: 2, explanation: "C'est le fondement scripturaire du sacrement du Baptême, administré obligatoirement au nom de la Sainte Trinité (Matthieu 28:19)." },
            { question: "À partir du 40ème jour (l'Ascension), que se passe-t-il concernant la procession de la Résurrection à l'église ?", options: ["Elle se fait uniquement dans le sanctuaire", "Elle sort dans les rues de la ville", "Elle se fait sans utiliser d'encens", "Elle est complètement annulée"], correctAnswer: 0, explanation: "La procession ne se fait plus dans la nef mais uniquement dans le sanctuaire, symbolisant l'entrée du Christ au ciel." },
            { question: "Que marque l'office de la Génuflexion (Sajda) célébré le soir de la Pentecôte ?", options: ["La fin définitive des prières de l'année", "Le retour autorisé des prosternations et le don de l'Esprit", "Le début de l'année copte", "La montée de Jésus au ciel"], correctAnswer: 1, explanation: "Après 50 jours d'interdiction, les croyants fléchissent de nouveau les genoux pour adorer la Trinité et le Saint-Esprit (Livre de la Sajda)." },
            { question: "Selon l'Évangile, qui est la première personne à avoir vu le Christ ressuscité au matin de Pâques ?", options: ["Saint Pierre", "Saint Jean", "La Vierge Marie", "Marie-Madeleine"], correctAnswer: 3, explanation: "Marie-Madeleine est la première à voir le Christ près du tombeau (Jean 20:14-16) et à annoncer la nouvelle aux apôtres." },
            { question: "Quelle est la première salutation que le Christ adresse aux disciples dans le Cénacle ?", options: ["« Pourquoi avez-vous peur ? »", "« La paix soit avec vous ! »", "« Je suis revenu. »", "« Repentez-vous ! »"], correctAnswer: 1, explanation: "« La paix soit avec vous ! » (Jean 20:19). C'est le don de la paix divine qui dissipe la crainte des disciples." },
            { question: "Que faisait le Christ avec les deux disciples sur le chemin d'Emmaüs avant d'être reconnu ?", options: ["Il marchait en silence", "Il leur expliquait les Écritures", "Il leur demandait de l'argent", "Il leur parlait de la fin du monde"], correctAnswer: 1, explanation: "Il leur expliquait dans toutes les Écritures ce qui le concernait (Luc 24:27), préparant leur cœur à la fraction du pain." },
            { question: "Selon le Credo de Nicée-Constantinople (dogme copte), de qui procède le Saint-Esprit ?", options: ["Du Père seul", "Du Père et du Fils (Filioque)", "Du Fils seul", "Des disciples"], correctAnswer: 0, explanation: "L'Église copte maintient le texte original du Credo (381 ap. J.-C.) : l'Esprit procède du Père seul." },
            { question: "Dans l'Église copte, comment appelle-t-on le ton liturgique joyeux utilisé durant les 50 jours ?", options: ["Le ton 'Kiahki'", "Le ton 'Hazini' (triste)", "Le ton 'Frayhi' (joyeux)", "Le ton 'Sanaoui' (annuel)"], correctAnswer: 2, explanation: "Le ton 'Frayhi' exprime la joie de la Résurrection et du salut accompli par le Christ." }
        ];

        // --- MOTEUR 3D ---
        let scene, camera, renderer, player, sStone, divineLight, tiberiasNet; 
        let fishes = [];
        
        window.onload = function() {
            let npcs = [];
            let keys = { ArrowUp: false, ArrowDown: false, ArrowLeft: false, ArrowRight: false, w: false, a: false, s: false, d: false, z: false, q: false };
            
            // --- JOYSTICK VARIABLES ---
            let joyX = 0, joyY = 0;
            let isDragging = false;
            let joyCenterX, joyCenterY, maxJoyRadius = 40;
            const joystickZone = document.getElementById('joystick-zone');
            const joystickKnob = document.getElementById('joystick-knob');

            let isDialogActive = false;
            let isQuizStarted = false;
            let ascensionChrist = null;
            let flames = [];
            let ripples = []; 
            const obstacles = [];
            
            const baseSpeed = 0.12; 
            const rotationSpeed = 0.05; 
            const interactionDistance = 4.5;
            
            let currentQuestionIndex = 0;
            let quizScore = 0;
            let currentLookAt = new THREE.Vector3(0, 12, 0);
            let walkCycle = 0;
            let headerHideTimer = null;
            let fishingState = "idle"; 
            let animationTimer = 0;

            init();
            animate();

            function init() {
                scene = new THREE.Scene();
                scene.background = new THREE.Color(0x87CEEB);
                scene.fog = new THREE.Fog(0x87CEEB, 20, 150);

                camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);

            function handleJoyMove(e) {
                if (!isDragging) return;
                let x = e.touches ? e.touches[0].clientX : e.clientX;
                let y = e.touches ? e.touches[0].clientY : e.clientY;
                let dx = x - joyCenterX, dy = y - joyCenterY;
                let dist = Math.sqrt(dx*dx + dy*dy);
                if (dist > maxJoyRadius) { dx = (dx/dist)*maxJoyRadius; dy = (dy/dist)*maxJoyRadius; }
                joystickKnob.style.transform = `translate(${dx}px, ${dy}px)`;
                joyX = dx/maxJoyRadius; joyY = dy/maxJoyRadius;
            }

            function handleJoyEnd() { isDragging = false; joystickZone.style.display = 'none'; joyX = 0; joyY = 0; }

            // Personnages Low-Poly réalistes
            function createHuman(c, glow = false) {
                const g = new THREE.Group(); 
                const m = glow ? new THREE.MeshBasicMaterial({ color: c }) : new THREE.MeshStandardMaterial({ color: c, roughness: 0.9 });
                const skinMat = glow ? m : new THREE.MeshStandardMaterial({ color: 0xe0ac69, roughness: 0.5 });
                const hairMat = glow ? m : new THREE.MeshStandardMaterial({ color: 0x2e1b0f, roughness: 0.9 });

                const body = new THREE.Mesh(new THREE.CylinderGeometry(0.22, 0.4, 1.1, 16), m);
                body.position.y = 0.55; body.castShadow = !glow;

                const shoulders = new THREE.Mesh(new THREE.SphereGeometry(0.24, 16, 16), m);
                shoulders.position.y = 1.1; shoulders.scale.set(1.5, 0.8, 1); shoulders.castShadow = !glow;

                const neck = new THREE.Mesh(new THREE.CylinderGeometry(0.08, 0.1, 0.15, 8), skinMat);
                neck.position.y = 1.25; neck.castShadow = !glow;

                const head = new THREE.Mesh(new THREE.SphereGeometry(0.22, 16, 16), skinMat);
                head.position.y = 1.45; head.castShadow = !glow;

                const armL = new THREE.Mesh(new THREE.CylinderGeometry(0.07, 0.05, 0.6, 8), m);
                armL.position.set(-0.35, 0.85, 0); armL.rotation.z = Math.PI / 10; armL.castShadow = !glow;

                const armR = new THREE.Mesh(new THREE.CylinderGeometry(0.07, 0.05, 0.6, 8), m);
                armR.position.set(0.35, 0.85, 0); armR.rotation.z = -Math.PI / 10; armR.castShadow = !glow;

                const handL = new THREE.Mesh(new THREE.SphereGeometry(0.06, 8, 8), skinMat); handL.position.set(-0.45, 0.5, 0);
                const handR = new THREE.Mesh(new THREE.SphereGeometry(0.06, 8, 8), skinMat); handR.position.set(0.45, 0.5, 0);

                g.add(body, shoulders, neck, head, armL, armR, handL, handR);
                if (!glow) {
                    const hair = new THREE.Mesh(new THREE.SphereGeometry(0.24, 16, 16, 0, Math.PI * 2, 0, Math.PI / 1.7), hairMat);
                    hair.position.y = 1.46; hair.castShadow = true; g.add(hair);
                }
                g.position.y = 0; return g;
            }

            function onWindowResize() { camera.aspect = window.innerWidth/window.innerHeight; camera.updateProjectionMatrix(); renderer.setSize(window.innerWidth, window.innerHeight); }

            function checkForInteraction() {
                if (isDialogActive) return;
                let closest = null, minD = interactionDistance;
                npcs.forEach(n => {
                    if (n.data.id === "finish_line") return;
                    let p = (n.data.id === 'ascension' || n.data.id === 'commission') ? new THREE.Vector3(n.data.position.x, 0, n.data.position.z) : n.mesh.position;
                    let d = player.position.distanceTo(p); if (d < minD) { minD = d; closest = n; }
                });
                if (closest) openDialog(closest.data);
            }

            function openDialog(d) {
                if (d.action.includes("teleport")) { teleport(d.action); return; }
                if (d.action === "start_quiz") { startQuiz(); return; }
                isDialogActive = true; 
                for (let k in keys) keys[k] = false; joyX = 0; joyY = 0;
                document.getElementById('dialog-title').innerText = d.title;
                document.getElementById('dialog-quote').innerText = d.quote;
                document.getElementById('dialog-dogma').innerText = d.dogma;
                document.getElementById('dialog-sources').innerText = "Sources : " + (d.sources || "Tradition");
                document.getElementById('dialog-box').classList.add('active');
            }

            function closeDialog() { isDialogActive = false; document.getElementById('dialog-box').classList.remove('active'); }

            function teleport(act) {
                const o = document.getElementById('fade-overlay'); 
                if (o) o.style.opacity = '1'; 
                isDialogActive = true;
                setTimeout(() => {
                    if(act === "teleport_sepulchre_inside") player.position.set(-500, 0, -494);
                    else if(act === "teleport_sepulchre_outside") player.position.set(-15, 0, -5);
                    else if(act === "teleport_inside") player.position.set(500, 0, 498);
                    else if(act === "teleport_outside") player.position.set(-10, 0, -32);
                    
                    if (Math.abs(player.position.x) > 400) { 
                        player.rotation.y = Math.PI; camera.position.set(player.position.x, 1.5, player.position.z); 
                        currentLookAt.set(player.position.x, 1.5, player.position.z - 5); camera.lookAt(currentLookAt); 
                    } else { 
                        camera.position.set(player.position.x, 12, player.position.z + 15); 
                    }
                    if (o) o.style.opacity = '0'; 
                    isDialogActive = false; 
                }, 1000);
            }

            function startQuiz() {
                if (isQuizStarted) return;
                isQuizStarted = true; isDialogActive = true; for (let k in keys) keys[k] = false; joyX = 0; joyY = 0;
                document.getElementById('ui-layer').style.display = 'none';
                document.getElementById('quiz-overlay').style.display = 'block';
                currentQuestionIndex = 0; quizScore = 0; loadQuizQuestion();
            }

            function closeQuiz() {
                isQuizStarted = false; isDialogActive = false;
                document.getElementById('quiz-overlay').style.display = 'none';
                document.getElementById('ui-layer').style.display = 'flex';
                player.position.z += 5;
            }

            function loadQuizQuestion() {
                const q = quizData[currentQuestionIndex]; const opt = document.getElementById('quiz-options'); document.getElementById('quiz-feedback').style.display = 'none'; document.getElementById('quiz-next-btn').style.display = 'none'; opt.innerHTML = '';
                if (currentQuestionIndex >= quizData.length) { showScore(); return; }
                document.getElementById('quiz-progress').innerText = `Question ${currentQuestionIndex + 1} / ${quizData.length}`; document.getElementById('quiz-question').innerText = q.question;
                q.options.forEach((o, i) => { const b = document.createElement('button'); b.className = 'quiz-option'; b.innerText = o; b.onclick = () => handleAnswer(i, q.correctAnswer, q.explanation); opt.appendChild(b); });
                const quizOverlay = document.getElementById('quiz-overlay');
                if(quizOverlay) quizOverlay.scrollTop = 0;
            }

            function handleAnswer(s, c, e) {
                const btns = document.querySelectorAll('.quiz-option'); const f = document.getElementById('quiz-feedback'); btns.forEach(b => b.disabled = true);
                if (s === c) { btns[s].classList.add('correct'); quizScore++; f.innerHTML = "<strong>Vrai !</strong> " + e; f.style.background = "#dcfce7"; }
                else { btns[s].classList.add('wrong'); btns[c].classList.add('correct'); f.innerHTML = "<strong>Erreur.</strong> " + e; f.style.background = "#fee2e2"; }
                f.style.display = 'block'; document.getElementById('quiz-next-btn').style.display = 'block';
                setTimeout(() => { const quizOverlay = document.getElementById('quiz-overlay'); if(quizOverlay) quizOverlay.scrollTop += 150; }, 100);
            }

            function showScore() {
                document.getElementById('quiz-question').innerHTML = `<span style="font-size:3rem; color:#b45309;">${quizScore} / ${quizData.length}</span><br>Bravo pour ce pèlerinage !`;
                document.getElementById('quiz-restart-btn').style.display = 'inline-block';
            }

            function updateUI(moved) {
                const h = document.getElementById('game-header');
                const btn = document.getElementById('btn-interact');

                if (h) {
                    if (moved) {
                        h.style.opacity = '0';
                        if(headerHideTimer) { clearTimeout(headerHideTimer); headerHideTimer = null; }
                    } else if (!headerHideTimer && h.style.opacity === '0') {
                        headerHideTimer = setTimeout(() => {
                            h.style.opacity = '1';
                            headerHideTimer = null;
                        }, 3000);
                    }
                }

                let near = false, txt = "ACTION", minD = interactionDistance;
                npcs.forEach(n => {
                    let p = (n.data.id === 'ascension' || n.data.id === 'commission') ? new THREE.Vector3(n.data.position.x, 0, n.data.position.z) : n.mesh.position;
                    let d = player.position.distanceTo(p);
                    if (d < minD) { near = true; minD = d; if(n.data.action === "dialog") txt = "MÉDITER"; else if(n.data.action.includes("inside")) txt = "ENTRER"; else if(n.data.action.includes("outside")) txt = "SORTIR"; else txt = "ÉPREUVE"; }
                    const v = n.mesh.position.clone(); v.y += 2.5; v.project(camera);
                    const x = (v.x*.5+.5)*window.innerWidth, y = (v.y*-.5+.5)*window.innerHeight;
                    
                    if (n.label && n.label.style) {
                        if (v.z > 1) { 
                            n.label.style.opacity = '0'; 
                        } else { 
                            n.label.style.opacity = '1'; 
                            n.label.style.left = x + 'px'; 
                            n.label.style.top = y + 'px'; 
                        }
                    }
                });
                
                if (btn) {
                    if (near && !isDialogActive && !isQuizStarted) { 
                        const isMobile = window.innerWidth < 768;
                        btn.innerHTML = isMobile ? txt : txt + '<br><small style="font-size:10px">(Espace)</small>'; 
                        btn.style.display = 'flex'; 
                        btn.style.flexDirection = 'column';
                    } else {
                        btn.style.display = 'none';
                    }
                }
            }

            function checkColl(x, z) { 
                if (Math.abs(x) > 400) return false; 
                for (let o of obstacles) { 
                    if (x > o.minX && x < o.maxX && z > o.minZ && z < o.maxZ) return true; 
                } 
                return false; 
            }


            function animate() {
                requestAnimationFrame(animate);
                const isInside = Math.abs(player.position.x) > 400;
                const speed = isInside ? baseSpeed * 0.4 : baseSpeed;
                let moved = false;

                if (!isDialogActive && !isQuizStarted) {
                    let rotInput = -joyX;
                    if (keys.ArrowLeft || keys.a || keys.q) rotInput += 1;
                    if (keys.ArrowRight || keys.d) rotInput -= 1;

                    let moveForwardInput = -joyY;
                    if (keys.ArrowUp || keys.w || keys.z) moveForwardInput += 1;
                    if (keys.ArrowDown || keys.s) moveForwardInput -= 1;

                    if (isInside) {
                        player.rotation.y += rotInput * rotationSpeed;
                        if (Math.abs(moveForwardInput) > 0.1) {
                            let nx = player.position.x + Math.sin(player.rotation.y) * speed * moveForwardInput;
                            let nz = player.position.z + Math.cos(player.rotation.y) * speed * moveForwardInput;
                            if(Math.abs(nx) > 486 && Math.abs(nx) < 514 && Math.abs(nz) > 486 && Math.abs(nz) < 514) { player.position.set(nx, 0, nz); moved = true; }
                        }
                    } else {
                        let mx = joyX;
                        if (keys.ArrowLeft || keys.a || keys.q) mx -= 1;
                        if (keys.ArrowRight || keys.d) mx += 1;
                        let mz = joyY;
                        if (keys.ArrowUp || keys.w || keys.z) mz -= 1;
                        if (keys.ArrowDown || keys.s) mz += 1;

                        if (mx !== 0 || mz !== 0) {
                            const len = Math.sqrt(mx*mx+mz*mz);
                            let nx = player.position.x + (mx/len)*speed; let nz = player.position.z + (mz/len)*speed;
                            if(!checkColl(nx, nz)) { player.position.set(nx, 0, nz); player.rotation.y = Math.atan2(mx, mz); moved = true; }
                        }
                    }
                    if (player.position.distanceTo(new THREE.Vector3(0, 0, -100)) < 2.5) startQuiz();
                }

                if(moved) { walkCycle += 0.2; player.position.y = Math.abs(Math.sin(walkCycle))*0.12; 
                    const inWater = player.position.x > -60 && player.position.x < -30 && player.position.z > -75 && player.position.z < -45;
                    if (inWater && Math.random() < 0.15 && !isInside) {
                        const ripple = new THREE.Mesh(new THREE.RingGeometry(0.2, 0.4, 16), new THREE.MeshBasicMaterial({ color: 0xffffff, transparent: true, opacity: 0.5, side: THREE.DoubleSide }));
                        ripple.rotation.x = -Math.PI / 2; ripple.position.set(player.position.x, 0.015, player.position.z); scene.add(ripple); ripples.push(ripple);
                    }
                } else player.position.y = 0;

                for (let i = ripples.length - 1; i >= 0; i--) { let r = ripples[i]; r.scale.addScalar(0.04); r.material.opacity -= 0.02; if (r.material.opacity <= 0) { scene.remove(r); r.geometry.dispose(); r.material.dispose(); ripples.splice(i, 1); } }

                if (isInside) {
                    player.visible = false; camera.position.set(player.position.x, 1.5, player.position.z);
                    const tL = new THREE.Vector3(player.position.x + Math.sin(player.rotation.y)*5, 1.5, player.position.z + Math.cos(player.rotation.y)*5);
                    currentLookAt.lerp(tL, 0.1); camera.lookAt(currentLookAt);
                } else {
                    player.visible = true; player.position.x = Math.max(-95, Math.min(95, player.position.x)); player.position.z = Math.max(-110, Math.min(145, player.position.z));
                    camera.position.x += (player.position.x - camera.position.x)*0.1; camera.position.y += (12 - camera.position.y)*0.1; camera.position.z += (player.position.z + 15 - camera.position.z)*0.1; camera.lookAt(player.position);
                }
                
                updateUI(moved);
                if (ascensionChrist && player.position.distanceTo(new THREE.Vector3(25, 0, -60)) < 20) { if(ascensionChrist.position.y < 6) ascensionChrist.position.y += 0.015; } else if(ascensionChrist) ascensionChrist.position.y = 0;
                
                // Pierre roulante vers la droite (+X)
                if (sStone) {
                    const distToTomb = player.position.distanceTo(new THREE.Vector3(-15, 0, -8));
                    if (distToTomb < 13 && player.position.x > -20) {
                        // Ouverture (roule vers la droite, x de -15 vers -10.5)
                        if (sStone.position.x < -10.5) {
                            sStone.position.x += 0.08;
                            sStone.rotation.z -= 0.036;
                        }
                        if (divineLight && divineLight.intensity < 2.5) {
                            divineLight.intensity += 0.05;
                        }
                    } else {
                        // Fermeture (roule vers la gauche pour reprendre sa place à -15)
                        if (sStone.position.x > -15) {
                            sStone.position.x -= 0.08;
                            sStone.rotation.z += 0.036;
                        }
                        if (divineLight && divineLight.intensity > 0) {
                            divineLight.intensity -= 0.05;
                        }
                    }
                }
       

                // Animation Tiberias (Jeter le filet et poissons)
                
                // if (tiberiasNet) {
                //     const distToTiberias = player.position.distanceTo(new THREE.Vector3(-35, 0, -64));
                //     if (distToTiberias < 15) {
                //         if (tiberiasNet.position.x > -43) tiberiasNet.position.x -= 0.1;
                //         if (tiberiasNet.position.z > -64) tiberiasNet.position.z -= 0.1;
                //         if (tiberiasNet.position.y > 0.1) tiberiasNet.position.y -= 0.05;

                //         if (tiberiasNet.position.y <= 0.2) {
                //             showFishes = setTimeout(() => {
                //                  fishes.forEach((f, i) => {
                //                 f.visible = true;
                //                 f.rotation.z = Math.sin(Date.now() * 0.01 + i) * 0.5;
                //                 if (f.position.y < 0.2) f.position.y += 0.01;
                //             });
                //             }, 1000);
                //         }
                        
            
                        
                //     } else {
                //         if (tiberiasNet.position.x < -36) tiberiasNet.position.x += 0.1;
                //         if (tiberiasNet.position.z < -64) tiberiasNet.position.z += 0.1;
                //         if (tiberiasNet.position.y < 1) tiberiasNet.position.y += 0.05;

                //         fishes.forEach(f => {
                //             f.visible = false;
                //             f.position.y = 0;
                //         });
                //     }
                // }

            if (tiberiasNet) {
                    const distToTiberias = player.position.distanceTo(new THREE.Vector3(-35, 0, -64));
                
               
                    // 1. Déclenchement initial si le joueur approche
                    if (distToTiberias < 20 && fishingState === "idle") {
                        fishingState = "lowering";
                    } 
                    // Optionnel : Forcer le retour si le joueur s'éloigne prématurément
                    else if (distToTiberias >= 20 && fishingState !== "idle" && fishingState !== "returning") {
                        fishingState = "returning";
                    }
                
                    // 2. Gestion de la séquence d'animation selon l'état actuel
                    switch (fishingState) {
                        
                        case "lowering":
                            // Le filet descend
                            if (tiberiasNet.position.x > -43) tiberiasNet.position.x -= 0.1;
                            if (tiberiasNet.position.z > -64) tiberiasNet.position.z -= 0.1;
                            if (tiberiasNet.position.y > 0.1) tiberiasNet.position.y -= 0.05;
                
                            // Une fois en bas, on passe à l'attente
                           if (tiberiasNet.position.x <= -43) {
                                fishingState = "waiting_fishes";
                                animationTimer = Date.now(); // Démarrage du chronomètre
                            }
                            break;
                
                        case "waiting_fishes":
                            // On attend 2 secondes (2000 ms) avant l'apparition des poissons
                            if (Date.now() - animationTimer >= 1000) {
                                fishingState = "showing_fishes";
                                animationTimer = Date.now(); // Réinitialisation du chrono pour la prochaine étape
                            }
                            break;
                
                        case "showing_fishes":
                            // Les poissons apparaissent et s'animent
                            fishes.forEach((f, i) => {
                                f.visible = true;
                                f.rotation.z = Math.sin(Date.now() * 0.01 + i) * 0.5;
                                if (f.position.y < 0.2) f.position.y += 0.01;
                            });
                
                            // On attend 2 autres secondes avant de remonter le filet
                            if (Date.now() - animationTimer >= 1000) {
                                fishingState = "returning";
                            }
                            break;
                
                       case "returning":
                            let isNetReturned = true;
                            
                            // 1. Calcul des incréments de déplacement pour cette frame
                            let deltaX = 0;
                            let deltaY = 0;
                            let deltaZ = 0;
                
                            if (tiberiasNet.position.x < -36) { deltaX = 0.1; isNetReturned = false; }
                            if (tiberiasNet.position.z < -64) { deltaZ = 0.1; isNetReturned = false; }
                            if (tiberiasNet.position.y < 1)   { deltaY = 0.05; isNetReturned = false; }
                
                            // 2. Application du déplacement au filet
                            tiberiasNet.position.x += deltaX;
                            tiberiasNet.position.z += deltaZ;
                            tiberiasNet.position.y += deltaY;
                
                            // 3. Application du MÊME déplacement aux poissons
                            fishes.forEach((f, i) => {
                                f.position.x += deltaX;
                                f.position.z += deltaZ;
                                f.position.y += deltaY;
                                
                                // Optionnel : maintenir l'animation de frétillement pendant le trajet
                                f.rotation.z = Math.sin(Date.now() * 0.01 + i) * 0.5;
                            });
                
                            // 4. Si le filet est revenu à sa place et que le joueur s'éloigne
                            if (isNetReturned && distToTiberias >= 20) {
                                // C'est seulement à la fin du trajet qu'on masque les poissons
                                fishes.forEach(f => {
                                    // 1. On masque les poissons
                                    f.visible = false;
                                    
                                    // 2. On restaure la position exacte d'origine
                                    if (f.initialPosition) {
                                        f.position.copy(f.initialPosition);
                                    } else {
                                        // Valeur de secours si userData n'a pas été défini
                                        f.position.y = 0; 
                                    }
                                });
                                
                                fishingState = "idle";
                            }
                            break;
                    }
                }

                if (flames.length > 0) {
                    const dP = player.position.distanceTo(new THREE.Vector3(0, 0, -80)); 
                    const t = Date.now() * 0.005;
                    if (dP < 18) { 
                        flames.forEach((f, i) => { 
                            const ty = 2.2 + Math.sin(t + i) * 0.1; 
                            if (f.position.y > ty + 0.1) f.position.y -= 0.025; 
                            else f.position.y = ty; 
                            const s = 1 + Math.sin(t * 3 + i) * 0.2; f.scale.set(s, s, s); 
                        }); 
                    } else { 
                        flames.forEach(f => { if (f.position.y < 8) f.position.y += 0.1; }); 
                    }
                }
                renderer.render(scene, camera);
            }
        };
    </script>
</body>
