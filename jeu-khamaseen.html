<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Pèlerinage 3D des 50 Jours (Khamaseen)</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            overflow: hidden;
            background-color: #87CEEB;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            touch-action: none;
        }
        #canvas-container {
            width: 100vw;
            height: 100vh;
            display: block;
        }
        /* UI Overlay */
        #ui-layer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }
        .header {
            background: rgba(0, 0, 0, 0.7);
            color: white;
            padding: 15px;
            text-align: center;
            border-bottom: 2px solid #f59e0b;
            pointer-events: auto;
        }
        .header h1 {
            margin: 0;
            font-size: 1.2rem;
            color: #fbd38d;
        }
        .header p {
            margin: 5px 0 0 0;
            font-size: 0.8rem;
        }
        /* Dialog Box */
        #dialog-box {
            display: none;
            background: rgba(255, 255, 255, 0.95);
            margin: 20px auto;
            width: 90%;
            max-width: 600px;
            border-radius: 12px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.5);
            pointer-events: auto;
            overflow: hidden;
            border: 2px solid #b45309;
            transform: translateY(20px);
            opacity: 0;
            transition: all 0.3s ease;
        }
        #dialog-box.active {
            display: block;
            transform: translateY(0);
            opacity: 1;
        }
        .dialog-header {
            background: #b45309;
            color: white;
            padding: 15px;
            font-weight: bold;
            font-size: 1.2rem;
        }
        .dialog-content {
            padding: 20px;
            color: #1e293b;
            font-size: 1rem;
            line-height: 1.5;
        }
        .bible-quote {
            font-style: italic;
            border-left: 4px solid #f59e0b;
            padding-left: 10px;
            margin-bottom: 15px;
            color: #334155;
        }
        .dogma-box {
            background: #fef3c7;
            border: 1px solid #fde68a;
            padding: 10px;
            border-radius: 8px;
            font-size: 0.9rem;
            margin-bottom: 15px;
        }
        .dogma-title {
            font-weight: bold;
            color: #92400e;
            margin-bottom: 5px;
        }
        .sources-section {
            font-size: 0.8rem;
            color: #64748b;
            border-top: 1px solid #cbd5e1;
            padding-top: 10px;
        }
        .btn-close {
            display: block;
            width: 100%;
            padding: 15px;
            background: #f1f5f9;
            border: none;
            border-top: 1px solid #cbd5e1;
            font-weight: bold;
            color: #0f172a;
            cursor: pointer;
            transition: background 0.2s;
        }
        .btn-close:hover {
            background: #e2e8f0;
        }
        
        /* Floating NPC Labels */
        .npc-label {
            position: absolute;
            color: white;
            background: rgba(0,0,0,0.6);
            padding: 4px 8px;
            border-radius: 4px;
            font-size: 12px;
            pointer-events: none;
            transform: translate(-50%, -50%);
            border: 1px solid #f59e0b;
            transition: opacity 0.2s;
            white-space: nowrap;
        }

        #fade-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background-color: black;
            opacity: 0;
            pointer-events: none;
            transition: opacity 1s ease;
            z-index: 9999;
        }

        /* --- CONTRÔLES MOBILE --- */
        #joystick-zone {
            position: absolute;
            bottom: 30px;
            left: 30px;
            width: 120px;
            height: 120px;
            background: rgba(255, 255, 255, 0.2);
            border-radius: 50%;
            border: 2px solid rgba(255, 255, 255, 0.4);
            pointer-events: auto;
            touch-action: none;
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }
        #joystick-knob {
            width: 50px;
            height: 50px;
            background: rgba(255, 255, 255, 0.8);
            border-radius: 50%;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
            pointer-events: none;
            transform: translate(0px, 0px);
        }
        #btn-interact {
            position: absolute;
            bottom: 50px;
            right: 30px;
            width: 90px;
            height: 90px;
            background: #b45309;
            color: white;
            border-radius: 50%;
            border: 3px solid #fbd38d;
            font-weight: bold;
            font-size: 13px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
            pointer-events: auto;
            display: none; 
            z-index: 1000;
            cursor: pointer;
            touch-action: none;
            align-items: center;
            justify-content: center;
            text-align: center;
        }
        #btn-interact:active {
            background: #92400e;
            transform: scale(0.95);
        }
        #pc-hint {
            position: absolute;
            bottom: 20px;
            left: 20px;
            background: rgba(0,0,0,0.7);
            color: white;
            padding: 10px 15px;
            border-radius: 8px;
            font-size: 14px;
            pointer-events: none;
            display: none;
        }

        /* --- QUIZ UI --- */
        #quiz-overlay {
            display: none;
            position: absolute;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background: rgba(15, 23, 42, 0.95);
            z-index: 10000;
            justify-content: center;
            align-items: center;
            pointer-events: auto;
        }
        #quiz-container {
            background: white;
            width: 90%;
            max-width: 700px;
            border-radius: 12px;
            padding: 30px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.8);
            border: 3px solid #b45309;
            text-align: center;
            overflow-y: auto;
            max-height: 90vh;
            position: relative;
        }
        #btn-exit-quiz {
            position: absolute;
            top: 20px;
            left: 20px;
            background: none;
            border: none;
            font-size: 1.5rem;
            color: #b45309;
            cursor: pointer;
            transition: transform 0.2s;
        }
        #btn-exit-quiz:hover {
            transform: scale(1.2);
        }
        #quiz-title {
            color: #b45309;
            margin-top: 0;
            font-size: 1.8rem;
        }
        #quiz-question {
            font-size: 1.2rem;
            color: #1e293b;
            margin: 20px 0;
            font-weight: bold;
        }
        .quiz-option {
            display: block;
            width: 100%;
            padding: 12px 15px;
            margin: 10px 0;
            background: #f1f5f9;
            border: 2px solid #cbd5e1;
            border-radius: 8px;
            font-size: 1rem;
            cursor: pointer;
            transition: all 0.2s;
            text-align: left;
        }
        .quiz-option:hover:not(:disabled) {
            background: #e2e8f0;
            border-color: #94a3b8;
        }
        .quiz-option.correct {
            background: #dcfce7;
            border-color: #22c55e;
            color: #166534;
        }
        .quiz-option.wrong {
            background: #fee2e2;
            border-color: #ef4444;
            color: #991b1b;
        }
        #quiz-feedback {
            margin-top: 20px;
            padding: 15px;
            border-radius: 8px;
            display: none;
            font-size: 0.95rem;
            text-align: left;
        }
        #quiz-next-btn, #quiz-restart-btn {
            margin-top: 20px;
            padding: 12px 25px;
            background: #b45309;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 1.1rem;
            cursor: pointer;
            display: none;
        }
        #quiz-next-btn:hover, #quiz-restart-btn:hover {
            background: #92400e;
        }
        #quiz-progress {
            font-size: 0.9rem;
            color: #64748b;
            margin-bottom: 15px;
        }

        @media (min-width: 768px) {
            #joystick-zone { display: none !important; }
            #btn-interact { display: none !important; }
        }
    </style>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
</head>
<body>

    <div id="canvas-container"></div>

    <div id="ui-layer">
        <div class="header">
            <h1>Pèlerinage des 50 Jours (Khamaseen)</h1>
            <p>Utilisez les contrôles pour marcher. Approchez les personnages pour méditer les Écritures.</p>
        </div>

        <!-- Contrôles mobiles & PC -->
        <div id="pc-hint">Appuyez sur ESPACE pour interagir</div>
        <button id="btn-interact">ACTION</button>
        
        <div id="joystick-zone">
            <div id="joystick-knob"></div>
        </div>

        <div id="dialog-box">
            <div class="dialog-header" id="dialog-title">Titre</div>
            <div class="dialog-content">
                <div class="bible-quote" id="dialog-quote">Citation biblique</div>
                <div class="dogma-box">
                    <div class="dogma-title">Dogme & Rite Copte Orthodoxe</div>
                    <div id="dialog-dogma">Règle liturgique</div>
                </div>
                <div class="sources-section" id="dialog-sources">
                    Sources
                </div>
            </div>
            <button class="btn-close" id="btn-close-dialog">Continuer le pèlerinage</button>
        </div>
        
        <div id="fade-overlay"></div>
    </div>

    <!-- Interface du Questionnaire -->
    <div id="quiz-overlay">
        <div id="quiz-container">
            <button id="btn-exit-quiz" title="Quitter le questionnaire">←</button>
            <h2 id="quiz-title">L'Épreuve du Témoin</h2>
            <div id="quiz-progress">Question 1 / 12</div>
            <div id="quiz-question">Question text</div>
            <div id="quiz-options"></div>
            <div id="quiz-feedback"></div>
            <button id="quiz-next-btn">Question suivante</button>
            <button id="quiz-restart-btn">Terminer le pèlerinage</button>
        </div>
    </div>

    <script>
        // --- DONNÉES FACTUELLES ET SOURCÉES ---
        const npcData = [
            {
                id: "mary", name: "Marie-Madeleine (Jour 1)", position: { x: -8, z: -5 }, color: 0xe11d48,
                title: "Le Tombeau Vide", quote: "« Ils ont enlevé le Seigneur du sépulcre, et nous ne savons où ils l'ont mis. » (Jean 20:2)",
                dogma: "La Résurrection marque le début du 'Khamaseen' (50 jours). Le ton liturgique devient 'Frayhi' (joyeux). Le jeûne et les métanies (prosternations) sont strictement interdits.",
                sources: "Bible : Jean 20:1-18. Rite : Synaxaire Copte.", action: "dialog"
            },
            {
                id: "sepulchre_door", name: "Entrée du Sépulcre", position: { x: -15, z: -8 }, color: 0x475569,
                title: "Entrer dans le Tombeau", quote: "", dogma: "", sources: "", action: "teleport_sepulchre_inside"
            },
            {
                id: "linen", name: "Les Linges Sacrés", position: { x: -500, z: -501 }, color: 0xffffff,

                dogma: "L'ordre parfait des linges réfute le vol (Jean 20:7). Des voleurs n'auraient pas pris le temps de séparer les bandelettes et de plier le suaire.",

            {
                id: "sepulchre_exit", name: "Sortir du Tombeau", position: { x: -500, z: -495 }, color: 0x475569,

            },
            {
                id: "emmaus", name: "Les Disciples d'Emmaüs (Jour 1)", position: { x: 15, z: -25 }, color: 0xd97706,
                title: "À l'Auberge d'Emmaüs", quote: "« Notre cœur ne brûlait-il pas au dedans de nous, lorsqu'il nous parlait en chemin ? » (Luc 24:32)",
                dogma: "Le Christ se fait reconnaître à la 'fraction du pain'. Cela fonde la présence réelle dans l'Eucharistie.",

            {

            {

                title: "Le Dimanche de la Nouvelle", quote: "« Thomas lui répondit : Mon Seigneur et mon Dieu ! » (Jean 20:28)",
                dogma: "Le 8ème jour (Ahad Touma) affirme la divinité absolue du Christ et la réalité physique de la Résurrection.",

            },
            {
                id: "peter", name: "Saint Pierre", position: { x: 503, z: 490 }, color: 0x2563eb,
                title: "La joie des disciples", quote: "« Les disciples furent dans la joie en voyant le Seigneur. » (Jean 20:20)",
                dogma: "La présence du Christ transforme la peur en joie. L'assemblée préfigure la liturgie dominicale.",
                sources: "Bible : Jean 20:20.", action: "dialog"
            },
            {
                id: "john", name: "Saint Jean", position: { x: 500, z: 493 }, color: 0x9333ea,
                title: "Le Témoin", quote: "« Ces choses ont été écrites afin que vous croyiez que Jésus est le Christ. » (Jean 20:31)",
                dogma: "L'Église s'appuie sur le témoignage apostolique oculaire.",
                sources: "Bible : Jean 20:30-31.", action: "dialog"
            },
            {
                id: "disciple_generic", name: "Les autres disciples", position: { x: 495, z: 493 }, color: 0x64748b,
                title: "L'assemblée du Cénacle", quote: "« Jésus vint, les portes étant fermées, et dit : La paix soit avec vous ! » (Jean 20:26)",
                dogma: "Le corps glorifié n'est plus soumis aux limites physiques tout en restant pleinement charnel.",
                sources: "Bible : Jean 20:26. Christologie orthodoxe.", action: "dialog"
            },
            {
                id: "cenacle_exit", name: "Sortir du Cénacle", position: { x: 500, z: 505 }, color: 0x8b4513,

            },
            {
                id: "tiberias", name: "La Mer de Tibériade", position: { x: -35, z: -60 }, color: 0xffffff,
                title: "L'Apparition en Galilée", quote: "« Simon, fils de Jonas, m'aimes-tu ? » Il lui répondit : « Oui, Seigneur, tu sais que je t'aime. » Jésus lui dit : « Pais mes brebis. » (Jean 21:16)",
                dogma: "La restauration de Pierre illustre le sacrement de la pénitence et le rôle pastoral.",
                sources: "Bible : Jean 21:1-19.", action: "dialog"
            },
            {
                id: "commission", name: "La mission des disciples", position: { x: 45, z: -78 }, color: 0xffffff,
                title: "La Montagne en Galilée", quote: "« Les onze disciples allèrent en Galilée, sur la montagne que Jésus leur avait désignée. [...] Allez, faites de toutes les nations des disciples, les baptisant au nom du Père, du Fils et du Saint-Esprit. » (Matthieu 28:16,19)",
                dogma: "Fondement dogmatique du sacrement du Baptême Trinitaire.",
                sources: "Bible : Matthieu 28:16-20.", action: "dialog"
            },
            {
                id: "ascension", name: "L'Ascension (Jour 40)", position: { x: 25, z: -60 }, color: 0x0284c7,
                title: "Le Mont des Oliviers", quote: "« Ce Jésus... viendra de la même manière. » (Actes 1:11)",
                dogma: "Procession uniquement dans le sanctuaire à partir de ce jour.",
                sources: "Bible : Actes 1:9-11.", action: "dialog"
            },
            {
                id: "pentecost", name: "La Pentecôte (Jour 50)", position: { x: 0, z: -80 }, color: 0xfacc15,
                title: "La Descente de l'Esprit Saint", quote: "« Et ils furent tous remplis du Saint-Esprit. » (Actes 2:4)",
                dogma: "Office de la Génuflexion (Sajda) le soir. L'Esprit procède du Père seul.",
                sources: "Bible : Actes 2:1-4.", action: "dialog"
            },
            {
                id: "finish_line", name: "Porte de l'Évangélisation (Fin)", position: { x: 0, z: -100 }, color: 0xf59e0b,
                title: "L'Heure du Témoignage", quote: "« Allez par tout le monde, et prêchez la bonne nouvelle à toute la création. » (Marc 16:15)",
                dogma: "Les 50 jours sont terminés. Le jeûne des apôtres commence pour préparer la prédication.",
                sources: "Bible : Marc 16:15.", action: "start_quiz"
            }
        ];

        // --- DONNÉES DU QUIZ (12 QUESTIONS) ---
        const quizData = [
            {
                question: "Pendant les 50 jours du Khamaseen, qu'est-il strictement interdit de faire dans l'Église copte orthodoxe ?",
                options: ["Prier le soir", "Jeûner et faire des métanies (prosternations)", "Lire l'Ancien Testament", "Chanter des louanges"],
                correctAnswer: 1,
                explanation: "Le Khamaseen est une période de fête continue. L'Église interdit le jeûne et les métanies de pénitence car l'Époux est avec nous (Marc 2:19)."
            },
            {
                question: "Que prouvent dogmatiquement les linges parfaitement pliés trouvés par Jean et Pierre dans le tombeau vide ?",
                options: ["Que les apôtres ont nettoyé le tombeau", "Que Jésus était pauvre", "Que le corps n'a pas été volé en hâte", "Que les anges portaient ces linges"],
                correctAnswer: 2,
                explanation: "L'ordre parfait réfute la rumeur d'un vol de corps. Des voleurs n'auraient pas pris le temps de séparer les linges et de plier le suaire à part (Jean 20:7)."
            },
            {
                question: "Complétez la confession de foi de Saint Thomas le 8ème jour : « Mon Seigneur et mon... »",
                options: ["Sauveur !", "Roi !", "Dieu !", "Maître !"],
                correctAnswer: 2,
                explanation: "« Mon Seigneur et mon Dieu ! » (Jean 20:28). Ce 8ème jour affirme formellement la divinité absolue du Christ."
            },
            {
                question: "Au bord de la mer de Tibériade, que demande Jésus trois fois à Pierre ?",
                options: ["« M'aimes-tu ? »", "« Pourquoi m'as-tu renié ? »", "« As-tu pêché des poissons ? »", "« Veux-tu me suivre ? »"],
                correctAnswer: 0,
                explanation: "Il lui demande trois fois « M'aimes-tu ? » pour effacer son triple reniement et lui confier la charge pastorale (Jean 21)."
            },
            {
                question: "Quel sacrement est fondé par le commandement : « baptisant au nom du Père, du Fils et du Saint-Esprit » (Grande Commission) ?",
                options: ["L'Eucharistie", "Le Mariage", "Le Baptême Trinitaire", "L'Ordination"],
                correctAnswer: 2,
                explanation: "C'est le fondement scripturaire du sacrement du Baptême, administré obligatoirement au nom de la Sainte Trinité (Matthieu 28:19)."
            },
            {
                question: "À partir du 40ème jour (l'Ascension), que se passe-t-il concernant la procession de la Résurrection à l'église ?",
                options: ["Elle se fait uniquement dans le sanctuaire", "Elle sort dans les rues de la ville", "Elle se fait sans utiliser d'encens", "Elle est complètement annulée"],
                correctAnswer: 0,
                explanation: "La procession ne se fait plus dans la nef mais uniquement dans le sanctuaire, symbolisant l'entrée du Christ au ciel."
            },
            {
                question: "Que marque l'office de la Génuflexion (Sajda) célébré le soir de la Pentecôte ?",
                options: ["La fin définitive des prières de l'année", "Le retour autorisé des prosternations et le don de l'Esprit", "Le début de l'année copte", "La montée de Jésus au ciel"],
                correctAnswer: 1,

            },
            {
                question: "Selon l'Évangile, qui est la première personne à avoir vu le Christ ressuscité au matin de Pâques ?",
                options: ["Saint Pierre", "Saint Jean", "La Vierge Marie", "Marie-Madeleine"],
                correctAnswer: 3,
                explanation: "Marie-Madeleine est la première à voir le Christ près du tombeau (Jean 20:14-16) et à annoncer la nouvelle aux apôtres."
            },
            {
                question: "Quelle est la première salutation que le Christ adresse aux disciples dans le Cénacle ?",
                options: ["« Pourquoi avez-vous peur ? »", "« La paix soit avec vous ! »", "« Je suis revenu. »", "« Repentez-vous ! »"],
                correctAnswer: 1,
                explanation: "« La paix soit avec vous ! » (Jean 20:19). C'est le don de la paix divine qui dissipe la crainte des disciples."
            },
            {
                question: "Que faisait le Christ avec les deux disciples sur le chemin d'Emmaüs avant d'être reconnu ?",
                options: ["Il marchait en silence", "Il leur expliquait les Écritures", "Il leur demandait de l'argent", "Il leur parlait de la fin du monde"],
                correctAnswer: 1,
                explanation: "Il leur expliquait dans toutes les Écritures ce qui le concernait (Luc 24:27), préparant leur cœur à la fraction du pain."
            },
            {
                question: "Selon le Credo de Nicée-Constantinople (dogme copte), de qui procède le Saint-Esprit ?",

                correctAnswer: 0,
                explanation: "L'Église copte maintient le texte original du Credo (381 ap. J.-C.) : l'Esprit procède du Père seul."

            {
                question: "Dans l'Église copte, comment appelle-t-on le ton liturgique joyeux utilisé durant les 50 jours ?",
                options: ["Le ton 'Kiahki'", "Le ton 'Hazini' (triste)", "Le ton 'Frayhi' (joyeux)", "Le ton 'Sanaoui' (annuel)"],
                correctAnswer: 2,
                explanation: "Le ton 'Frayhi' exprime la joie de la Résurrection et du salut accompli par le Christ."
            }
        ];

        // --- MOTEUR 3D ---
        window.onload = function() {
            let scene, camera, renderer, player;
            let npcs = [];
            let keys = { ArrowUp: false, ArrowDown: false, ArrowLeft: false, ArrowRight: false, w: false, a: false, s: false, d: false };
            
            // --- JOYSTICK VARIABLES ---
            let joyX = 0, joyY = 0;
            let isDragging = false;
            let joyCenterX, joyCenterY, maxJoyRadius = 35;
            const joystickZone = document.getElementById('joystick-zone');
            const joystickKnob = document.getElementById('joystick-knob');

            let isDialogActive = false;
            let isQuizStarted = false;
            let ascensionChrist = null;
            let flames = [];
            let ripples = []; 
            const obstacles = [];
            
            const baseSpeed = 0.12; 
            const rotationSpeed = 0.05; 
            const interactionDistance = 4;
            
            let currentQuestionIndex = 0;
            let quizScore = 0;
            let currentLookAt = new THREE.Vector3(0, 12, 0);
            let walkCycle = 0;

            init();
            animate();

            function init() {

                const fireGeo = new THREE.ConeGeometry(0.5, 1, 8); const fireMat = new THREE.MeshBasicMaterial({ color: 0xff4500 });

                const net = new THREE.Mesh(new THREE.BoxGeometry(4, 0.2, 4), new THREE.MeshStandardMaterial({ color: 0x8b4513, wireframe: true })); net.position.set(-38, 0.1, -58); scene.add(net);

                const linens = new THREE.Mesh(new THREE.BoxGeometry(3, 0.1, 1.5), new THREE.MeshStandardMaterial({color: 0xffffff})); linens.position.set(-1, 1.25, -1); sepulchreGroup.add(linens);

                sepulchreGroup.position.set(-500, 0, -500); scene.add(sepulchreGroup);

                const cenacleGroup = new THREE.Group();
                const floor = new THREE.Mesh(new THREE.PlaneGeometry(30, 30), new THREE.MeshStandardMaterial({ color: 0x5c4033 })); floor.rotation.x = -Math.PI / 2; cenacleGroup.add(floor);
                const cenWallMat = new THREE.MeshStandardMaterial({ color: 0xebd5b3 });
                const wallN = new THREE.Mesh(new THREE.BoxGeometry(30, 10, 1), cenWallMat); wallN.position.set(0, 5, -15);
                const wallS = new THREE.Mesh(new THREE.BoxGeometry(30, 10, 1), cenWallMat); wallS.position.set(0, 5, 15);
                const wallE = new THREE.Mesh(new THREE.BoxGeometry(1, 10, 30), cenWallMat); wallE.position.set(15, 5, 0);
                const wallW = new THREE.Mesh(new THREE.BoxGeometry(1, 10, 30), cenWallMat); wallW.position.set(-15, 5, 0);
                cenacleGroup.add(wallN, wallS, wallE, wallW);
                const christCenacle = createHuman(0xffffff, true); christCenacle.position.set(0, 0, -10); cenacleGroup.add(christCenacle);

                npcData.forEach(data => {

                        const mF = new THREE.Mesh(fGeo, fMat); mF.position.set(data.position.x, 8, data.position.z); scene.add(mF); flames.push(mF);
                        [{x: -2, z: 0}, {x: 2, z: 0}].forEach(off => {
                            const disc = createHuman(0x64748b); disc.position.set(data.position.x + off.x, 0, data.position.z + off.z); scene.add(disc);
                            const f = new THREE.Mesh(fGeo, fMat); f.position.set(data.position.x + off.x, 8 + Math.random(), data.position.z + off.z); scene.add(f); flames.push(f);
                        });
                    } else if (data.id === "emmaus") {
                        npcMesh = createHuman(data.color); npcMesh.position.set(data.position.x - 1.5, 0, data.position.z);
                        const disc2 = createHuman(0xb45309); disc2.position.set(data.position.x + 1.5, 0, data.position.z); scene.add(disc2);
                    } else if (data.id === "tiberias") {
                        npcMesh = createHuman(0xffffff, true); npcMesh.position.set(data.position.x, 0, data.position.z);
                        const peter = createHuman(0x2563eb); peter.position.set(data.position.x + 2, 0, data.position.z + 1); scene.add(peter);
                        for(let i=0; i<3; i++) { 
                            const d = createHuman(0x64748b); d.position.set(data.position.x - 3, 0, data.position.z + i*1.5); scene.add(d);
                        }
                    } else if (data.id === "commission") {
                        npcMesh = createHuman(0xffffff, true); npcMesh.position.set(data.position.x, 4, data.position.z);
                        for(let i=0; i<11; i++) { 
                            const d = createHuman(0x64748b);
                            const angle = (i/11) * Math.PI * 1.5 + Math.PI*0.25; 
                            d.position.set(data.position.x + Math.cos(angle)*6, 0, data.position.z + 4 + Math.sin(angle)*3);
                            scene.add(d);
                        }
                    } else if (data.id === "finish_line") {
                        npcMesh = new THREE.Mesh(new THREE.BoxGeometry(6, 1, 1), new THREE.MeshBasicMaterial({ visible: false }));

                });

                // Écouteurs d'événements
                window.addEventListener('keydown', (e) => { if (keys.hasOwnProperty(e.key)) keys[e.key] = true; if (e.key === ' ' && !isDialogActive) checkForInteraction(); });
                window.addEventListener('keyup', (e) => { if (keys.hasOwnProperty(e.key)) keys[e.key] = false; });
                
                joystickZone.addEventListener('touchstart', handleJoyStart, {passive: false});
                joystickZone.addEventListener('touchmove', handleJoyMove, {passive: false});
                joystickZone.addEventListener('touchend', handleJoyEnd);
                joystickZone.addEventListener('mousedown', handleJoyStart);
                document.addEventListener('mousemove', handleJoyMove);
                document.addEventListener('mouseup', handleJoyEnd);

                const actionBtn = document.getElementById('btn-interact');
                actionBtn.addEventListener('click', checkForInteraction);
                actionBtn.addEventListener('touchstart', (e) => { e.preventDefault(); checkForInteraction(); });

                document.getElementById('btn-close-dialog').addEventListener('click', closeDialog);
                document.getElementById('quiz-next-btn').addEventListener('click', () => { currentQuestionIndex++; loadQuizQuestion(); });
                document.getElementById('quiz-restart-btn').addEventListener('click', () => { location.reload(); });
                document.getElementById('btn-exit-quiz').addEventListener('click', closeQuiz);
                window.addEventListener('resize', onWindowResize);
            }

            function handleJoyStart(e) {
                isDragging = true;
                const rect = joystickZone.getBoundingClientRect();
                joyCenterX = rect.left + rect.width / 2;
                joyCenterY = rect.top + rect.height / 2;
                handleJoyMove(e);
            }

            function handleJoyMove(e) {
                if (!isDragging) return;
                e.preventDefault();
                let clientX = e.touches ? e.touches[0].clientX : e.clientX;
                let clientY = e.touches ? e.touches[0].clientY : e.clientY;
                let dx = clientX - joyCenterX;
                let dy = clientY - joyCenterY;
                let distance = Math.sqrt(dx*dx + dy*dy);
                if (distance > maxJoyRadius) { dx = (dx / distance) * maxJoyRadius; dy = (dy / distance) * maxJoyRadius; }
                joystickKnob.style.transform = `translate(${dx}px, ${dy}px)`;
                joyX = dx / maxJoyRadius; joyY = dy / maxJoyRadius;
            }

            function handleJoyEnd() { isDragging = false; joystickKnob.style.transform = `translate(0px, 0px)`; joyX = 0; joyY = 0; }

            function createHuman(c, glow = false) {
                const g = new THREE.Group(); 
                const m = glow ? new THREE.MeshBasicMaterial({ color: c }) : new THREE.MeshStandardMaterial({ color: c, roughness: 0.9 });
                const skinMat = glow ? m : new THREE.MeshStandardMaterial({ color: 0xe0ac69, roughness: 0.5 });
                const hairMat = glow ? m : new THREE.MeshStandardMaterial({ color: 0x2e1b0f, roughness: 0.9 });
                const body = new THREE.Mesh(new THREE.CylinderGeometry(0.22, 0.4, 1.1, 16), m); body.position.y = 0.55; body.castShadow = !glow;
                const shoulders = new THREE.Mesh(new THREE.SphereGeometry(0.24, 16, 16), m); shoulders.position.y = 1.1; shoulders.scale.set(1.5, 0.8, 1); shoulders.castShadow = !glow;
                const neck = new THREE.Mesh(new THREE.CylinderGeometry(0.08, 0.1, 0.15, 8), skinMat); neck.position.y = 1.25; neck.castShadow = !glow;
                const head = new THREE.Mesh(new THREE.SphereGeometry(0.22, 16, 16), skinMat); head.position.y = 1.45; head.castShadow = !glow;
                const armL = new THREE.Mesh(new THREE.CylinderGeometry(0.07, 0.05, 0.6, 8), m); armL.position.set(-0.35, 0.85, 0); armL.rotation.z = Math.PI / 10; armL.castShadow = !glow;
                const armR = new THREE.Mesh(new THREE.CylinderGeometry(0.07, 0.05, 0.6, 8), m); armR.position.set(0.35, 0.85, 0); armR.rotation.z = -Math.PI / 10; armR.castShadow = !glow;
                const handL = new THREE.Mesh(new THREE.SphereGeometry(0.06, 8, 8), skinMat); handL.position.set(-0.45, 0.5, 0);
                const handR = new THREE.Mesh(new THREE.SphereGeometry(0.06, 8, 8), skinMat); handR.position.set(0.45, 0.5, 0);
                g.add(body, shoulders, neck, head, armL, armR, handL, handR);
                if (!glow) { const hair = new THREE.Mesh(new THREE.SphereGeometry(0.24, 16, 16, 0, Math.PI * 2, 0, Math.PI / 1.7), hairMat); hair.position.y = 1.46; hair.castShadow = true; g.add(hair); }
                g.position.y = 0; return g;
            }

            function createBuilding(x, z, w, h, d, mat) {
                const b = new THREE.Mesh(new THREE.BoxGeometry(w, h, d), mat); b.position.set(x, h/2, z); b.castShadow = true; b.receiveShadow = true;
                scene.add(b); return b;
            }

            function onWindowResize() { camera.aspect = window.innerWidth / window.innerHeight; camera.updateProjectionMatrix(); renderer.setSize(window.innerWidth, window.innerHeight); }

            function checkForInteraction() {
                let closest = null; let minD = interactionDistance;
                npcs.forEach(npc => {
                    if (npc.data.id === "finish_line") return;
                    if (Math.abs(player.position.x - npc.data.position.x) < 50 && Math.abs(player.position.z - npc.data.position.z) < 50) {
                        const pos = (npc.data.id === 'ascension' || npc.data.id === 'commission') ? new THREE.Vector3(npc.data.position.x, 0, npc.data.position.z) : npc.mesh.position;
                        const d = player.position.distanceTo(pos); if (d < minD) { minD = d; closest = npc; }
                    }
                });
                if (closest) openDialog(closest.data);
            }

            function openDialog(d) {
                if (d.action === "teleport_inside") { teleportPlayer(500, 498); return; }
                if (d.action === "teleport_outside") { teleportPlayer(-10, -32); return; }
                if (d.action === "teleport_sepulchre_inside") { teleportPlayer(-500, -493); return; }
                if (d.action === "teleport_sepulchre_outside") { teleportPlayer(-15, -5); return; }
                if (d.action === "start_quiz") { startQuiz(); return; }
                isDialogActive = true; for (let k in keys) keys[k] = false;
                document.getElementById('dialog-title').innerText = d.title; document.getElementById('dialog-quote').innerText = d.quote;
                document.getElementById('dialog-dogma').innerText = d.dogma; document.getElementById('dialog-sources').innerText = "Sources : " + d.sources;
                document.getElementById('dialog-box').classList.add('active'); 
                document.getElementById('btn-interact').style.display = 'none';
                document.getElementById('pc-hint').style.display = 'none';
            }

            function closeDialog() { isDialogActive = false; document.getElementById('dialog-box').classList.remove('active'); }

            function teleportPlayer(tx, tz) {
                const o = document.getElementById('fade-overlay'); o.style.opacity = '1'; isDialogActive = true;
                setTimeout(() => {
                    player.position.set(tx, 0, tz);
                    if (tx < -400 || tx > 400) { 
                        player.rotation.y = Math.PI; camera.position.set(tx, 1.5, tz); currentLookAt.set(tx, 1.5, tz - 5); camera.lookAt(currentLookAt); 
                    } else { 
                        camera.position.set(tx, 12, tz + 15); camera.lookAt(player.position); 
                    }
                    setTimeout(() => { o.style.opacity = '0'; isDialogActive = false; }, 500);
                }, 1000);
            }

            function startQuiz() {
                if (isQuizStarted) return;
                isQuizStarted = true; isDialogActive = true; for (let k in keys) keys[k] = false; joyX = 0; joyY = 0;
                document.getElementById('ui-layer').style.display = 'none';
                document.getElementById('quiz-overlay').style.display = 'flex';
                currentQuestionIndex = 0; quizScore = 0; loadQuizQuestion();
            }

            function closeQuiz() { isQuizStarted = false; isDialogActive = false; document.getElementById('quiz-overlay').style.display = 'none'; document.getElementById('ui-layer').style.display = 'flex'; player.position.z += 5; }

            function loadQuizQuestion() {
                const qData = quizData[currentQuestionIndex]; const feedback = document.getElementById('quiz-feedback'); const next = document.getElementById('quiz-next-btn'); const options = document.getElementById('quiz-options');
                feedback.style.display = 'none'; next.style.display = 'none'; options.innerHTML = '';
                if (currentQuestionIndex >= quizData.length) { showFinalScore(); return; }
                document.getElementById('quiz-progress').innerText = `Question ${currentQuestionIndex + 1} / ${quizData.length}`; document.getElementById('quiz-question').innerText = qData.question;
                qData.options.forEach((opt, i) => { const btn = document.createElement('button'); btn.className = 'quiz-option'; btn.innerText = opt; btn.onclick = () => handleAnswer(i, qData.correctAnswer, qData.explanation); options.appendChild(btn); });
            }

            function handleAnswer(sel, corr, expl) {
                const btns = document.querySelectorAll('.quiz-option'); const feedback = document.getElementById('quiz-feedback'); const next = document.getElementById('quiz-next-btn');
                btns.forEach(b => b.disabled = true);
                if (sel === corr) { btns[sel].classList.add('correct'); quizScore++; feedback.innerHTML = `<strong>Excellente réponse !</strong><br>${expl}`; feedback.style.background = "#dcfce7"; feedback.style.color = "#166534"; }
                else { btns[sel].classList.add('wrong'); btns[corr].classList.add('correct'); feedback.innerHTML = `<strong>Erreur !</strong><br>${expl}`; feedback.style.background = "#fee2e2"; feedback.style.color = "#991b1b"; }
                feedback.style.display = 'block'; next.style.display = 'inline-block';
            }

            function showFinalScore() {
                const qDiv = document.getElementById('quiz-question');
                qDiv.innerHTML = `<span style="font-size:3rem; display:block; color:#b45309;">${quizScore} / ${quizData.length}</span><br>${quizScore >= 9 ? "Parfait ! Vous êtes un excellent témoin." : "Très bien ! Relisez les sources pour parfaire vos connaissances."}`;
                document.getElementById('quiz-restart-btn').style.display = 'inline-block';
            }

            function updateLabels() {
                let near = false;
                let closestActionText = "ACTION";
                let minD = interactionDistance;

                npcs.forEach(npc => {
                    let d = 999;
                    if (Math.abs(player.position.x - npc.data.position.x) < 50 && Math.abs(player.position.z - npc.data.position.z) < 50) {
                        const pos = (npc.data.id === 'ascension' || npc.data.id === 'finish_line' || npc.data.id === 'commission') ? new THREE.Vector3(npc.data.position.x, 0, npc.data.position.z) : npc.mesh.position;
                        d = player.position.distanceTo(pos);
                    }
                    
                    if (d < minD) {
                        near = true;
                        minD = d;
                        // Déterminer le libellé en fonction de l'action
                        if (npc.data.action === "dialog") closestActionText = "MÉDITER";
                        else if (npc.data.action.includes("inside")) closestActionText = "ENTRER";
                        else if (npc.data.action.includes("outside")) closestActionText = "SORTIR";
                        else if (npc.data.action === "start_quiz") closestActionText = "ÉPREUVE";
                    }

                    const v = npc.mesh.position.clone(); v.y += (npc.data.id === 'pentecost') ? 3.8 : 2.2; 
                    if (npc.data.id === 'finish_line') v.y += 2.0; if (npc.data.id === 'commission') v.y += 4.0;
                    v.project(camera); const x = (v.x * .5 + .5) * window.innerWidth; const y = (v.y * -.5 + .5) * window.innerHeight;
                    if (v.z > 1) { npc.label.style.opacity = '0'; } else { npc.label.style.opacity = '1'; npc.label.style.left = `${x}px`; npc.label.style.top = `${y}px`; }
                });
                
                const isMobile = window.innerWidth < 768;
                const interactBtn = document.getElementById('btn-interact');
                const pcHint = document.getElementById('pc-hint');

                if (near && !isDialogActive && !isQuizStarted) {
                    if(isMobile) {
                        interactBtn.innerText = closestActionText;
                        interactBtn.style.display = 'flex';
                        pcHint.style.display = 'none';
                    } else {
                        interactBtn.style.display = 'none';
                        pcHint.innerText = `Appuyez sur ESPACE pour ${closestActionText.toLowerCase()}`;
                        pcHint.style.display = 'block';
                    }
                } else {
                    interactBtn.style.display = 'none';
                    pcHint.style.display = 'none';
                }
            }

            function checkCollision(x, z) {
                if (Math.abs(x) > 400) return false;
                const margin = 0.5;
                for (let obs of obstacles) { if (x + margin > obs.minX && x - margin < obs.maxX && z + margin > obs.minZ && z - margin < obs.maxZ) return true; }
                return false;
            }

            function animate() {
                requestAnimationFrame(animate);
                const inSepulchre = player.position.x < -400;
                const inCenacle = player.position.x > 400;
                const isFirstPerson = inSepulchre || inCenacle;
                const currentSpeed = isFirstPerson ? baseSpeed * 0.3 : baseSpeed;
                let isMoving = false;

                if (!isDialogActive && !isQuizStarted) {
                    if (isFirstPerson) {
                        if (keys.ArrowLeft || keys.a) player.rotation.y += rotationSpeed;
                        if (keys.ArrowRight || keys.d) player.rotation.y -= rotationSpeed;
                        if (Math.abs(joyX) > 0.1) player.rotation.y -= joyX * rotationSpeed;
                        let moveDir = 0; if (keys.ArrowUp || keys.w) moveDir = 1; if (keys.ArrowDown || keys.s) moveDir = -1;
                        if (Math.abs(joyY) > 0.1) moveDir = -joyY;
                        if (moveDir !== 0) {
                            let nextX = player.position.x + Math.sin(player.rotation.y) * currentSpeed * moveDir;
                            let nextZ = player.position.z + Math.cos(player.rotation.y) * currentSpeed * moveDir;
                            if (inSepulchre) { if (nextX > -507 && nextX < -493 && nextZ > -507 && nextZ < -492) { player.position.x = nextX; player.position.z = nextZ; isMoving = true; } }
                            else if (inCenacle) { if (nextX > 486 && nextX < 514 && nextZ > 486 && nextZ < 514) { player.position.x = nextX; player.position.z = nextZ; isMoving = true; } }
                        }
                    } else {
                        let moveX = 0, moveZ = 0;
                        if (keys.ArrowUp || keys.w) moveZ -= 1; if (keys.ArrowDown || keys.s) moveZ += 1;
                        if (keys.ArrowLeft || keys.a) moveX -= 1; if (keys.ArrowRight || keys.d) moveX += 1;
                        if (Math.abs(joyX) > 0.1) moveX = joyX; if (Math.abs(joyY) > 0.1) moveZ = joyY;
                        if (moveX !== 0 || moveZ !== 0) {
                            isMoving = true; const len = Math.sqrt(moveX*moveX + moveZ*moveZ);
                            let nextX = player.position.x + (moveX/len) * currentSpeed; let nextZ = player.position.z + (moveZ/len) * currentSpeed;
                            if (!checkCollision(nextX, nextZ)) { player.position.x = nextX; player.position.z = nextZ; player.rotation.y = Math.atan2(moveX, moveZ); }
                        }
                    }
                    if (player.position.distanceTo(new THREE.Vector3(0, 0, -100)) < 2.5) startQuiz();
                }

                if (isMoving) { walkCycle += 0.15; player.position.y = Math.abs(Math.sin(walkCycle)) * 0.15;
                    const inWater = player.position.x > -60 && player.position.x < -30 && player.position.z > -75 && player.position.z < -45;
                    if (inWater && Math.random() < 0.15 && !isFirstPerson) {
                        const ripple = new THREE.Mesh(new THREE.RingGeometry(0.2, 0.4, 16), new THREE.MeshBasicMaterial({ color: 0xffffff, transparent: true, opacity: 0.5, side: THREE.DoubleSide }));
                        ripple.rotation.x = -Math.PI / 2; ripple.position.set(player.position.x, 0.015, player.position.z); scene.add(ripple); ripples.push(ripple);
                    }
                } else { player.position.y = 0; }
                
                for (let i = ripples.length - 1; i >= 0; i--) { let r = ripples[i]; r.scale.addScalar(0.04); r.material.opacity -= 0.02; if (r.material.opacity <= 0) { scene.remove(r); r.geometry.dispose(); r.material.dispose(); ripples.splice(i, 1); } }

                if (isFirstPerson) {
                    player.visible = false; camera.position.copy(player.position); camera.position.y += 1.5; 
                    const targetLookAt = new THREE.Vector3(player.position.x + Math.sin(player.rotation.y) * 5, camera.position.y, player.position.z + Math.cos(player.rotation.y) * 5);
                    currentLookAt.lerp(targetLookAt, 0.1); camera.lookAt(currentLookAt);
                } else {
                    player.visible = true; player.position.x = Math.max(-95, Math.min(95, player.position.x)); player.position.z = Math.max(-110, Math.min(145, player.position.z));
                    camera.position.x += (player.position.x - camera.position.x) * 0.1; camera.position.y += (12 - camera.position.y) * 0.1;
                    camera.position.z += (player.position.z + 15 - camera.position.z) * 0.1; camera.lookAt(player.position);
                }
                updateLabels();
                if (ascensionChrist) {
                    const dA = player.position.distanceTo(new THREE.Vector3(25, 0, -60));
                    if (dA < 20) { if (ascensionChrist.position.y < 6) ascensionChrist.position.y += 0.015; } else { ascensionChrist.position.y = 0; }
                }
                if (flames.length > 0) {
                    const dP = player.position.distanceTo(new THREE.Vector3(0, 0, -80)); const t = Date.now() * 0.005;
                    if (dP < 25) { flames.forEach((f, i) => { const ty = 2.4 + Math.sin(t + i) * 0.1; if (f.position.y > ty + 0.1) f.position.y -= 0.04; else f.position.y = ty; const s = 1 + Math.sin(t * 3 + i) * 0.2; f.scale.set(s, s, s); }); }
                    else { flames.forEach(f => { f.position.y = 8 + Math.random() * 2; }); }
                }
                renderer.render(scene, camera);
            }
        };
    </script>
</body>
</html>
